<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!--
  BOTTOM SHEET FRAGMENT
  ─────────────────────
  Used in: map.html

  Variables expected from controller:
    - ${nearbyLocals}   List<Local>   list of nearby locals/gems
    - ${nearbyCount}    Integer       total count label

  Usage:
    <div th:replace="~{fragments/bottom-sheet :: bottom-sheet}"></div>
-->
<div th:fragment="bottom-sheet" class="bottom-sheet" id="bottom-sheet">

  <div class="bottom-sheet__handle"></div>

  <!-- Label -->
  <div class="u-flex u-items-center u-justify-between" style="margin-bottom: 12px;">
    <div class="section-label" style="margin-bottom: 0;">
      Nearby
      <span th:if="${nearbyCount != null}">· <span th:text="${nearbyCount}">8</span> results</span>
      <span th:unless="${nearbyCount != null}">· 8 results</span>
    </div>
    <!-- View all link -->
    <a th:href="@{/explore}" class="u-text-xs u-text-muted" style="letter-spacing:.08em; text-decoration:none;">
      See all →
    </a>
  </div>

  <!-- Local cards list -->
  <div class="local-cards anim-stagger" id="local-cards-list">

    <!-- Thymeleaf loop: frend replaces this with real data -->
    <th:block th:if="${nearbyLocals != null and !nearbyLocals.isEmpty()}">
      <div th:each="local : ${nearbyLocals}"
           th:replace="~{fragments/local-card :: local-card(local=${local})}">
      </div>
    </th:block>

    <!-- Fallback: shown only when no server data (static preview) -->
    <th:block th:unless="${nearbyLocals != null and !nearbyLocals.isEmpty()}">

      <div class="local-card" onclick="showToast('Viewing Ana Horvat')">
        <div class="local-card__avatar">👩</div>
        <div class="local-card__info">
          <div class="local-card__name">Ana Horvat</div>
          <div class="local-card__meta">Zagreb · Food, Art</div>
        </div>
        <div class="local-card__rating">★ 4.9</div>
      </div>

      <div class="local-card" onclick="showToast('Viewing Luka Novak')">
        <div class="local-card__avatar">👨</div>
        <div class="local-card__info">
          <div class="local-card__name">Luka Novak</div>
          <div class="local-card__meta">Zagreb · Night, Music</div>
        </div>
        <div class="local-card__rating">★ 4.7</div>
      </div>

      <div class="local-card" onclick="showToast('Viewing Maja Petrić')">
        <div class="local-card__avatar">👩‍🦱</div>
        <div class="local-card__info">
          <div class="local-card__name">Maja Petrić</div>
          <div class="local-card__meta">Zagreb · History, Views</div>
        </div>
        <div class="local-card__rating">★ 5.0</div>
      </div>

      <div class="local-card" onclick="showToast('Viewing Ivan Blažić')">
        <div class="local-card__avatar">🧑</div>
        <div class="local-card__info">
          <div class="local-card__name">Ivan Blažić</div>
          <div class="local-card__meta">Zagreb · Art, Night</div>
        </div>
        <div class="local-card__rating">★ 4.6</div>
      </div>

      <div class="local-card" onclick="showToast('Viewing Petra Šimić')">
        <div class="local-card__avatar">👩‍🦰</div>
        <div class="local-card__info">
          <div class="local-card__name">Petra Šimić</div>
          <div class="local-card__meta">Zagreb · Nature, Food</div>
        </div>
        <div class="local-card__rating">★ 4.8</div>
      </div>

    </th:block>

  </div>
</div>

</body>
</html>
