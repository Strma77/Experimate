<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
  <title>Map</title>
  <th:block layout:fragment="extra-head">
    <style>
      /* ── Map page overrides ───────────────────── */

      /* Full-bleed map — remove default page scroll */
      #page-map-content {
        position: relative;
        height: 100%;
        overflow: hidden;
      }

      /* Leaflet container fills everything */
      #map {
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      /* Dark tile filter */
      .leaflet-tile {
        filter: brightness(0.32) saturate(0.25) hue-rotate(190deg);
      }
      .leaflet-container {
        background: #0a0a0a;
      }

      /* Hide default Leaflet attribution (keep legal: shown in about page) */
      .leaflet-control-attribution {
        display: none;
      }

      /* ── Map overlays ─────────────────────────── */
      .map-overlay {
        position: absolute;
        z-index: 10;
        pointer-events: none;
      }
      .map-overlay--interactive {
        pointer-events: all;
      }

      /* Search bar — floats top */
      .map-search {
        top: 12px;
        left: 12px;
        right: 12px;
      }

      .map-search .search-bar {
        background: rgba(10, 10, 10, 0.92);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-color: var(--border-2);
        box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      }

      .map-search .search-bar:focus-within {
        border-color: var(--accent-border);
      }

      /* Filter pills row */
      .map-filters {
        top: 62px;
        left: 12px;
        display: flex;
        gap: 6px;
      }

      .map-filters .pill {
        background: rgba(10, 10, 10, 0.88);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      }

      /* Map legend — bottom right, above sheet */
      .map-legend {
        bottom: 108px;
        right: 12px;
        background: rgba(10, 10, 10, 0.90);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .map-legend__row {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 10px;
        color: var(--text-2);
        letter-spacing: 0.06em;
        white-space: nowrap;
      }

      .map-legend__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .map-legend__dot--gem   { background: var(--accent); opacity: 0.7; }
      .map-legend__dot--event { background: var(--warm);   opacity: 0.7; }

      /* ── Custom map pins ──────────────────────── */
      .map-pin {
        width: 14px;
        height: 14px;
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        border: 2px solid;
        position: relative;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .map-pin:hover {
        transform: rotate(-45deg) scale(1.3);
      }

      .map-pin::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 5px; height: 5px;
        border-radius: 50%;
      }

      .map-pin--gem {
        background: rgba(200, 255, 0, 0.25);
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(200, 255, 0, 0.3);
      }
      .map-pin--gem::after   { background: var(--accent); }

      .map-pin--event {
        background: rgba(255, 107, 53, 0.25);
        border-color: var(--warm);
        box-shadow: 0 0 8px rgba(255, 107, 53, 0.3);
      }
      .map-pin--event::after { background: var(--warm); }

      /* ── Leaflet popup dark theme ─────────────── */
      .dark-popup .leaflet-popup-content-wrapper {
        background: var(--surface);
        border: 1px solid var(--border-2);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 0;
        box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      }
      .dark-popup .leaflet-popup-content {
        margin: 10px 14px;
        line-height: 1.5;
      }
      .dark-popup .leaflet-popup-tip-container { display: none; }
      .dark-popup .leaflet-popup-close-button {
        color: var(--text-3);
        font-size: 16px;
        padding: 4px 8px;
      }
      .dark-popup .leaflet-popup-close-button:hover { color: var(--text); }

      .popup-name {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 13px;
        color: var(--text);
        margin-bottom: 2px;
      }
      .popup-type {
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-2);
      }
      .popup-type--gem   { color: var(--accent); }
      .popup-type--event { color: var(--warm); }
    </style>
  </th:block>
</head>

<!-- ═══════════════════════════════════════════
     PAGE CONTENT
═══════════════════════════════════════════ -->
<main layout:fragment="content" class="page-content page-content--overflow-hidden">
  <div id="page-map-content">

    <!-- ── Leaflet map ───────────────────────── -->
    <div id="map"></div>

    <!-- ── Search bar ───────────────────────── -->
    <div class="map-overlay map-overlay--interactive map-search">
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="var(--text-3)" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text"
               id="map-search-input"
               placeholder="Search city or local..."
               autocomplete="off">
      </div>
    </div>

    <!-- ── Filter pills ─────────────────────── -->
    <div class="map-overlay map-overlay--interactive map-filters">
      <div class="pill pill--active" onclick="togglePill(this); mapFilterToggle('gems')">
        Gems
      </div>
      <div class="pill pill--warm" onclick="togglePill(this); mapFilterToggle('events')">
        Events
      </div>
      <div class="pill" onclick="togglePill(this); mapFilterToggle('locals')">
        Locals
      </div>
    </div>

    <!-- ── Legend ───────────────────────────── -->
    <div class="map-overlay map-legend">
      <div class="map-legend__row">
        <div class="map-legend__dot map-legend__dot--gem"></div>
        Hidden Gem
      </div>
      <div class="map-legend__row">
        <div class="map-legend__dot map-legend__dot--event"></div>
        Event
      </div>
    </div>

    <!-- ── Bottom sheet ─────────────────────── -->
    <!--
      th:replace pulls in the fragment.
      ${nearbyLocals} and ${nearbyCount} come from MapController.
    -->
    <div th:replace="~{fragments/bottom-sheet :: bottom-sheet}"></div>

  </div>
</main>

<!-- ═══════════════════════════════════════════
     PAGE SCRIPTS
═══════════════════════════════════════════ -->
<th:block layout:fragment="scripts">

  <!--
    Pass server-side data to JS safely via data attributes.
    Frend populates ${mapPinsJson} in MapController:
      model.addAttribute("mapPinsJson", objectMapper.writeValueAsString(pins));

    Format expected (array of objects):
    [
      { "lat": 45.815, "lng": 15.982, "name": "Secret Café", "type": "gem" },
      { "lat": 45.820, "lng": 15.978, "name": "Community Meetup", "type": "event" }
    ]
  -->
  <div id="map-data"
       th:attr="data-pins=${mapPinsJson} ?: '[]'"
       style="display:none;">
  </div>

  <script th:src="@{/js/map.js}"></script>
  <script th:src="@{/js/websocket.js}"></script>

</th:block>

</html>
